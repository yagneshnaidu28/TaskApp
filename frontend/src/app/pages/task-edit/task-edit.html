<!-- pages/task-edit/task-edit.html -->
<div class="form-wrapper">
    <div class="form-card">

        <div class="form-header">
            <button class="btn-back" (click)="goBack()">← Back</button>
            <h2>Update Task</h2>
        </div>

        @if (errorMessage()) {
        <div class="alert alert-error">{{ errorMessage() }}</div>
        }

        @if (isLoadingTask()) {
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading task...</p>
        </div>
        } @else {
        <form (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label for="title">Title <span class="required">*</span></label>
                <input id="title" type="text" [(ngModel)]="title" name="title" placeholder="Enter task title"
                    required />
            </div>

            <div class="form-group">
                <label for="body">Description</label>
                <textarea id="body" [(ngModel)]="body" name="body" placeholder="Enter task description"
                    rows="5"></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="goBack()">Cancel</button>
                <button type="submit" class="btn-submit" [disabled]="isSaving()">
                    {{ isSaving() ? 'Saving...' : 'Update Task' }}
                </button>
            </div>

        </form>
        }

    </div>
</div>
